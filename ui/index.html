<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pi-console</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Login -->
  <div id="login-screen">
    <div class="login-box">
      <h2>pi-console</h2>
      <input type="password" id="token-input" placeholder="Token" autocomplete="off" />
      <div id="login-error"></div>
      <button id="login-btn" class="primary">Login</button>
    </div>
  </div>

  <!-- App -->
  <div id="app-screen" style="display:none; flex-direction:column; height:100vh; overflow:hidden">
    <header>
      <div class="github-icon-wrap" id="github-wrap">
        <a id="github-link" class="github-icon-link" href="#" target="_blank" rel="noopener" style="display:none" title="GitHubで開く">
          <svg height="20" width="20" viewBox="0 0 16 16" fill="#ffffff"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.65 7.65 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
        </a>
      </div>
      <select id="header-ws-select" class="header-select">
        <option value="">Workspace...</option>
      </select>
      <button type="button" class="settings-btn" id="settings-btn" title="設定">&#9881;</button>
    </header>
    <div class="sub-header">
      <div id="clean-dirty-status" class="clean-dirty-status"></div>
      <select id="branch-select" class="header-select branch-select">
        <option value="">branch...</option>
      </select>
      <div class="git-summary-panel" id="main-git-status"></div>
    </div>
    <div class="commit-message-panel" id="main-commit-message"></div>
    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay" style="display:none">
      <div class="modal">
        <h3>表示するワークスペース</h3>
        <div class="ws-check-list" id="ws-check-list"></div>
        <div class="modal-actions">
          <button id="settings-close">閉じる</button>
        </div>
      </div>
    </div>
    <!-- Job Create Modal -->
    <div id="job-create-modal" class="modal-overlay" style="display:none">
      <div class="modal">
        <h3>ジョブ作成</h3>
        <div class="form-group">
          <label class="form-label">ジョブ名 <span class="form-hint">(英数字・ハイフン・アンダースコア)</span></label>
          <input type="text" id="job-create-name" class="form-input" placeholder="my-job" autocomplete="off" />
        </div>
        <div class="form-group">
          <label class="form-label">表示名</label>
          <input type="text" id="job-create-label" class="form-input" placeholder="マイジョブ" autocomplete="off" />
        </div>
        <div class="form-group">
          <label class="form-label">スクリプト</label>
          <textarea id="job-create-script" class="form-textarea" rows="6" placeholder="echo hello"></textarea>
        </div>
        <div id="job-create-error" class="form-error"></div>
        <div class="modal-actions">
          <button type="button" id="job-create-cancel">キャンセル</button>
          <button type="button" id="job-create-submit" class="primary" style="width:auto">作成</button>
        </div>
      </div>
    </div>
    <!-- Diff Modal -->
    <div id="diff-modal" class="modal-overlay" style="display:none">
      <div class="modal diff-modal">
        <h3>変更内容</h3>
        <div class="diff-file-list" id="diff-file-list"></div>
        <pre class="diff-content" id="diff-content"></pre>
        <div class="modal-actions">
          <button id="diff-close">閉じる</button>
        </div>
      </div>
    </div>
    <div class="main-container">
      <!-- Main panel -->
      <div class="main-panel">
        <div class="job-bar">
          <div class="job-grid" id="job-cards"></div>
          <button type="button" id="job-run-main" class="job-run-main" title="Run selected job" aria-label="Run selected job">&#9654;</button>
        </div>
        <div id="detail-section" style="display:none">
          <div class="args-form" id="args-container"></div>
        </div>
        <div class="output-area" id="output">
          <div class="empty-state">ジョブを選択して実行</div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
