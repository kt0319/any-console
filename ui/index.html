<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pi-console</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Login -->
  <div id="login-screen">
    <div class="login-box">
      <h2>pi-console</h2>
      <input type="password" id="token-input" placeholder="Token" autocomplete="off" />
      <div id="login-error"></div>
      <button id="login-btn" class="primary">Login</button>
    </div>
  </div>

  <!-- App -->
  <div id="app-screen" style="display:none; flex-direction:column; height:100vh">
    <header>
      <h1>pi-console</h1>
      <span id="connection-status">Connecting...</span>
    </header>
    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay" style="display:none">
      <div class="modal">
        <h3>表示するワークスペース</h3>
        <div class="ws-check-list" id="ws-check-list"></div>
        <div class="modal-actions">
          <button id="settings-close">閉じる</button>
        </div>
      </div>
    </div>
    <!-- Mobile: pill selectors -->
    <div class="mobile-job-selector" id="mobile-ws-selector"></div>
    <div class="mobile-job-selector" id="mobile-job-selector"></div>

    <div class="main-container">
      <!-- PC: sidebar -->
      <div class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-header">
            <h2>Workspaces</h2>
            <button class="settings-btn" id="settings-btn" title="設定">&#9881;</button>
          </div>
          <div id="ws-cards"></div>
        </div>
        <div class="sidebar-section">
          <h2>Jobs</h2>
          <div id="job-cards"></div>
        </div>
      </div>

      <div class="detail-panel">
        <div id="detail-section" style="display:none">
          <div class="detail-header">
            <h2 id="detail-title"></h2>
            <p id="detail-desc"></p>
          </div>
          <div class="args-form" id="args-container"></div>
          <div class="action-bar">
            <button id="run-btn" class="primary" disabled>Run</button>
          </div>
        </div>
        <div class="output-area" id="output">
          <div class="empty-state">ジョブを選択してください</div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
