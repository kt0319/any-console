<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
  <title>pi-console</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1a1b26" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="pi-console" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/mshaugh/nerdfont-webfonts@v3.3.0/build/hack-nerd-font.css" integrity="sha384-qsvUYQ4b5u1viJpX3ORdCvicVqq4lxoEWqN4yPbGZfIuvSB2tGZv4+7/2jqpZwMu" crossorigin="anonymous" />
  <link rel="stylesheet" href="vendor/css/materialdesignicons.min.css" />
  <link rel="stylesheet" href="vendor/css/xterm.css" />
  <link rel="stylesheet" href="vendor/css/tokyo-night-dark.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Login -->
  <div id="login-screen">
    <form class="login-box" onsubmit="event.preventDefault(); return false;">
      <h2>pi-console</h2>
      <input type="password" id="token-input" placeholder="Token" autocomplete="current-password" name="token" />
      <div id="login-error"></div>
      <button id="login-btn" class="primary" type="submit">Login</button>
    </form>
  </div>

  <!-- App -->
  <div id="app-screen" style="display:none; flex-direction:column; overflow:hidden">
    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title">設定</h3>
          <button type="button" id="settings-close" class="modal-close-btn">&times;</button>
        </div>
        <div id="settings-menu-view">
          <div class="settings-device-name">
            <label for="device-name-input">端末名</label>
            <input type="text" id="device-name-input" placeholder="例: iPhone, iPad, PC" maxlength="30" autocomplete="off">
          </div>
          <div class="settings-menu">
            <button type="button" class="settings-menu-item" id="btn-terminal-settings"><span class="mdi mdi-format-font-size-increase"></span> ターミナル</button>
            <button type="button" class="settings-menu-item" id="btn-editor-settings"><span class="mdi mdi-application-edit-outline"></span> エディタ</button>
            <button type="button" class="settings-menu-item" id="btn-config-file"><span class="mdi mdi-file-cog"></span> 設定ファイル</button>
            <button type="button" class="settings-menu-item" id="btn-server-info"><span class="mdi mdi-information-outline"></span> サーバー</button>
          </div>
        </div>
        <div id="settings-terminal-view" style="display:none">
          <div class="modal-scroll-body" id="settings-terminal-body"></div>
        </div>
        <div id="settings-editor-view" style="display:none">
          <div class="modal-scroll-body" id="settings-editor-body"></div>
        </div>
        <div id="settings-server-info-view" style="display:none">
          <div class="modal-scroll-body" id="server-info-list"></div>
        </div>
        <div id="settings-config-file-view" style="display:none">
          <div class="modal-scroll-body" id="config-file-body"></div>
        </div>
      </div>
    </div>
    <!-- Git Modal -->
    <div id="git-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="git-modal-title">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title">コミット履歴</h3>
          <button id="git-modal-close" class="modal-close-btn" title="閉じる">&times;</button>
        </div>
        <div id="git-modal-content" style="display:none">
          <div id="git-graph-pane" class="git-graph-pane" style="display:none">
            <div class="modal-scroll-body" id="git-graph-list"></div>
          </div>
          <div class="diff-layout">
            <div id="git-upper-pane" class="git-upper-pane">
              <div id="git-history-pane">
                <div class="modal-scroll-body" id="git-history-list"></div>
                <div id="git-commit-action-menu" class="commit-action-menu" style="display:none"></div>
                <div id="git-create-branch-area" style="display:none">
                  <div class="git-create-branch-row">
                    <input type="text" id="git-branch-name-input" class="form-input" placeholder="新しいブランチ名" autocomplete="off" />
                    <button type="button" id="git-create-branch-submit" class="primary">作成</button>
                    <button type="button" id="git-create-branch-close">閉じる</button>
                  </div>
                  <div id="git-branch-error" class="form-error"></div>
                </div>
              </div>
              <div id="git-files-pane" style="display:none">
                <div class="diff-actions" id="diff-actions" style="display:none"></div>
                <div class="diff-file-list" id="diff-file-list"></div>
                <div id="diff-commit-form" style="display:none">
                  <div class="git-create-branch-row diff-commit-row">
                    <input type="text" id="diff-commit-message" class="form-input" placeholder="コミットメッセージ" autocomplete="off" />
                    <button type="button" id="diff-commit-submit" class="primary">コミット</button>
                    <button type="button" id="diff-commit-cancel">閉じる</button>
                  </div>
                  <div id="diff-commit-error" class="form-error"></div>
                </div>
              </div>
              <div id="git-stash-pane" style="display:none">
                <div class="stash-pane-toolbar">
                  <button type="button" class="stash-save-btn" id="stash-save-btn">stash save</button>
                </div>
                <div class="modal-scroll-body" id="git-stash-list"></div>
              </div>
              <div id="git-branch-pane" style="display:none">
                <div class="modal-scroll-body" id="git-branch-list"></div>
              </div>
              <div id="git-github-pane" style="display:none">
                <div class="modal-scroll-body" id="git-github-content"></div>
              </div>
            </div>
            <div class="diff-lower-pane">
              <div class="diff-viewer-pane">
                <div class="diff-content" id="diff-content"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- Job Confirm Modal -->
    <div id="job-confirm-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="job-confirm-title">
      <div class="modal">
        <div class="modal-header">
          <h3 id="job-confirm-title">ジョブ実行</h3>
          <button type="button" id="job-confirm-cancel-x" class="modal-close-btn" title="閉じる">&times;</button>
        </div>
        <div class="args-form" id="job-confirm-args"></div>
        <div class="modal-actions">
          <button type="button" id="job-confirm-cancel">キャンセル</button>
          <button type="button" id="job-confirm-run" class="primary" style="width:auto">実行</button>
        </div>
      </div>
    </div>
    <div class="main-container">
      <!-- Main panel -->
      <div class="main-panel">
        <div class="tab-bar-row" style="display:none">
          <div class="tab-bar" id="tab-bar"></div>
          <div id="quick-input" class="quick-input" style="display:none">
            <div class="quick-input-panel" id="quick-input-panel"></div>
          </div>
        </div>
        <div class="header-row2" id="header-row2" style="display:none">
          <button type="button" class="commit-msg-btn" id="header-commit-msg" title="コミット履歴"></button>
          <div class="git-summary-panel" id="main-git-status"></div>
          <div class="git-actions" id="git-actions" style="display:none">
            <button type="button" class="git-action-btn pull-btn" id="pull-btn" title="Pull">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
              <span class="git-action-count" id="pull-count"></span>
            </button>
            <button type="button" class="git-action-btn icon-only upstream-set-btn" id="set-upstream-btn" title="追跡設定">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            </button>
            <button type="button" class="git-action-btn upstream-btn" id="push-upstream-btn" title="Push">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 16 12 10 18 16"/><polyline points="6 10 12 4 18 10"/></svg>
              <span class="git-action-count" id="push-upstream-count"></span>
            </button>
            <button type="button" class="git-action-btn push-btn" id="push-btn" title="Push">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
              <span class="git-action-count" id="push-count"></span>
            </button>
          </div>
        </div>
        <div class="output-container" id="output-container">
          <div class="output-area" id="output">
          </div>
        </div>
      </div>
    </div>
    <!-- Icon Picker Modal -->
    <div id="icon-picker-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="icon-picker-title">
      <div class="modal">
        <div class="modal-header">
          <h3 id="icon-picker-title">アイコン選択</h3>
          <button type="button" id="icon-picker-close" class="modal-close-btn">&times;</button>
        </div>
        <div class="icon-picker-input-row">
          <input type="text" id="icon-picker-search" class="form-input icon-picker-search" placeholder="アイコン検索 / URLでfavicon" autocomplete="off" />
          <div id="icon-picker-favicon-confirm" class="icon-picker-favicon-confirm">
            <span id="icon-picker-favicon-preview" class="icon-picker-favicon-preview"></span>
            <button type="button" id="icon-picker-clear" class="icon-picker-clear-btn">クリア</button>
            <button type="button" id="icon-picker-upload" class="icon-picker-upload-btn"><span class="mdi mdi-image-plus"></span> 画像</button>
            <input type="file" id="icon-picker-upload-input" accept="image/png,image/jpeg,image/gif,image/webp,image/svg+xml" style="display:none" />
            <button type="button" id="icon-picker-url-ok" class="primary icon-picker-url-ok-btn" disabled>決定</button>
          </div>
        </div>
        <div id="icon-picker-color-section">
          <div id="icon-picker-color-palette" class="color-palette"></div>
        </div>
        <div id="icon-picker-grid" class="icon-picker-grid"></div>
      </div>
    </div>
  </div>

  <script src="vendor/js/highlight.min.js"></script>
  <script src="vendor/js/xterm.js"></script>
  <script src="vendor/js/addon-fit.js"></script>
  <script src="vendor/js/addon-web-links.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
