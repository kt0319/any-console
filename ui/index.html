<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pi-console</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Login -->
  <div id="login-screen">
    <div class="login-box">
      <h2>pi-console</h2>
      <input type="password" id="token-input" placeholder="Token" autocomplete="off" />
      <div id="login-error"></div>
      <button id="login-btn" class="primary">Login</button>
    </div>
  </div>

  <!-- App -->
  <div id="app-screen" style="display:none; flex-direction:column; height:100vh">
    <header>
      <select id="header-ws-select" class="header-select">
        <option value="">Workspace...</option>
      </select>
      <button type="button" class="settings-btn" id="settings-btn" title="設定">&#9881;</button>
    </header>
    <div class="sub-header">
      <select id="branch-select" class="header-select branch-select">
        <option value="">branch...</option>
      </select>
      <div class="git-summary-panel" id="main-git-status"></div>
    </div>
    <div class="commit-message-panel" id="main-commit-message"></div>
    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay" style="display:none">
      <div class="modal">
        <h3>表示するワークスペース</h3>
        <div class="ws-check-list" id="ws-check-list"></div>
        <div class="modal-actions">
          <button id="settings-close">閉じる</button>
        </div>
      </div>
    </div>
    <div class="main-container">
      <!-- Main panel -->
      <div class="main-panel">
        <div class="job-bar">
          <div class="job-grid" id="job-cards"></div>
          <button type="button" id="job-run-main" class="job-run-main" title="Run selected job" aria-label="Run selected job">&#9654;</button>
        </div>
        <div id="detail-section" style="display:none">
          <div class="args-form" id="args-container"></div>
        </div>
        <div class="output-area" id="output">
          <div class="empty-state">ジョブを選択して実行</div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
